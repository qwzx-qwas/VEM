schema_version: 3
project: visual-element-mcp
design_source: docs/DESIGN.md
requirements_source: docs/requirements.yaml
status_values:
  task: [todo, in_progress, blocked, done]
  phase: [todo, in_progress, blocked, passed, failed]
execution_policy:
  atomic_task_only: true
  require_task_dependencies: true
  require_phase_dependencies: true
  test_after_each_task: true
  continue_on_failure: false
  require_progress_update: true
  require_phase_gate: true
  edge_first: true
  security_floor_must_not_fallback: true
  require_direct_contract_bindings: true
  require_bidirectional_contract_mapping: true
  atomic_task_expected_workdays: [1, 3]

phases:
  - id: P0
    title: Edge Vite-injected walking skeleton and minimum contracts
    status: todo
    depends_on: []
    gate:
      commands: ["pnpm edge:preflight:verify", "pnpm install --frozen-lockfile", "pnpm roadmap:validate", "pnpm build", "pnpm typecheck", "pnpm test"]
      done_when:
        - EDGE-PREFLIGHT-001 has reproducible canonical-Git fixed-toolchain filesystem Edge Stable Windows-WSL HTTP-WebSocket-HMR loopback private-runtime ACL and real-process evidence or the phase remains blocked.
        - The preregistered P0 value micro-pilot completes before topology and verification expansion and records an honest continue-or-adjust verdict without consuming later holdouts.
        - Workspace checks are reproducible.
        - Edge Stable can select one intrinsic JSX button and return a PRIV-MIN-001 bounded source resolution backed by the minimum EvidenceGraph through MCP.
        - Injected selection is reported as page-untrusted under SEL-PROV-001 and strict prepared work requires an external prompt or confirmation binding.
        - The real Vite and MCP OS processes close TOP-P0-001 through private runtime discovery the same-origin browser proxy and one authoritative project instance.
        - A fixture source edit is prepared before editing with a RevisionContext barrier then correlated through VER-TXN-001 module-intersection evidence and journal replay to the correct Edge update batch and passes text verification.
        - Verification before and after observations are collected fresh under OBS-FRESH-001 and no ordinary context cache can produce passed.
        - Protocol and roadmap schemas reject invalid states and oversized payloads.
        - The minimum protocol including MCP-COMPAT-001 task and no-task behavior injected-browser source-anchor and verification decisions are recorded as accepted ADRs.
        - Production output contains no generated VEM marker client endpoint or mapping.
    tasks:
      - {id: P0-T0, title: Record EDGE-PREFLIGHT-001 ADR and standalone probes for canonical Git fixed Node-pnpm execution profile filesystem registry-proxy Edge Stable launch Windows-WSL HTTP-WebSocket-HMR loopback private ACL two-process and evidence schema, contracts: [EDGE-PREFLIGHT-001], status: todo, depends_on: [], tests: [Git-worktree and evidence-commit probe, Node-pnpm-registry-proxy and filesystem watcher probe, Edge msedge channel launch, Windows-WSL HTTP-WebSocket-HMR reachability, runtime-directory owner-ACL, two-process restart and non-loopback fail-closed checks]}
      - {id: P0-T1, title: Create pnpm TypeScript monorepo with pinned Node pnpm strict mode Vitest ESLint and record LICENSE-POLICY-001 project dependency and third-party notice baseline, contracts: [LICENSE-POLICY-001, TEST-GATE-001], status: todo, depends_on: [P0-T0], tests: [workspace smoke tests, clean frozen install package-license dependency-policy third-party-notice and vendored-asset checks]}
      - {id: P0-T2, title: Add REQ-TRACE-001 roadmap requirements contract-ID and internal-link validator with consistent task phase state rules, contracts: [REQ-TRACE-001, TEST-GATE-001], status: todo, depends_on: [P0-T1], tests: [valid invalid unknown-contract uncovered-normative-section missing-test-map broken-link orphan cyclic and inconsistent-state fixtures]}
      - {id: P0-T3, title: Record MCP-COMPAT-001 baseline protocol ADR and specifications for negotiated revisions task-no-task behavior RevisionContext PRIV-MIN-001 bounded summary VemError and minimum EvidenceGraph, contracts: [CORE-BOUND-001, REV-ID-001, EVIDENCE-TRUST-001, PRIV-MIN-001, MCP-COMPAT-001], status: todo, depends_on: [P0-T1], tests: [ADR lint contract-ID revision semantics primary-compat initialization no-task schema size privacy output evidence and compatibility tests]}
      - {id: P0-T4, title: Create React Vite TypeScript demo privacy prompt-injection and malicious-input fixtures, contracts: [PRIV-MIN-001], status: todo, depends_on: [P0-T1], tests: [demo build, private-field URL-secret prompt-data and malicious fixture smoke tests]}
      - {id: P0-T5, title: Record SEL-PROV-001 injected-browser ADR and add minimum selector overlay PRIV-MIN-001 projection bounded summary and external-confirmation limitation, contracts: [BROWSER-MODE-001, SEL-PROV-001, PRIV-MIN-001], status: todo, depends_on: [P0-T3, P0-T4], tests: [ADR lint target overlay page-untrusted provenance strict-confirmation private-field redaction prompt-data and summary-bound tests]}
      - {id: P0-T15, title: Record source-anchor and PROD-LEAK-001 ADR then implement only the dev-only intrinsic-JSX transform for the pinned Vite React matrix, contracts: [REV-ID-001, EVIDENCE-TRUST-001, PROD-LEAK-001], status: todo, depends_on: [P0-T3, P0-T4], tests: [ADR lint plugin-order sourcemap Fast-Refresh reserved-attribute build-nonexecution production-leakage and user-attribute tests]}
      - {id: P0-T16, title: Implement revision-scoped source registry publication and lookup prototype over the P0 transform output, contracts: [REV-ID-001, EVIDENCE-TRUST-001], status: todo, depends_on: [P0-T15], tests: [registry revision collision relative-location transform-compatibility and stale-anchor tests]}
      - {id: P0-T17, title: Execute preregistered three-to-five-task UX-GATE-001 value micro-pilot comparing direct source search with selection-summary source candidates, contracts: [UX-GATE-001], status: todo, depends_on: [P0-T5, P0-T16], tests: [evidence-plan immutability task-timing source-top-k wrong-attribution setup-cost and continue-or-adjust verdict checks]}
      - {id: P0-T7, title: Record TOP-P0-001 topology ADR and implement MCP-owned coordinator private runtime discovery project-instance ownership and restart semantics, contracts: [TOP-P0-001], status: todo, depends_on: [P0-T17], tests: [real-process discovery ACL owner restart stale-instance and ambiguity tests]}
      - {id: P0-T11, title: Add Vite same-origin browser proxy with separate untrusted page ingress and authenticated build-integration registry channel, contracts: [EVIDENCE-TRUST-001, TOP-P0-001, PRIV-MIN-001], status: todo, depends_on: [P0-T7], tests: [proxy routing ingress schema size privacy build-capability source-registry privilege and reconnect tests]}
      - {id: P0-T12, title: Add MCP initialization single-consumer immutable claim and bounded source-resolution tools over the authoritative coordinator, contracts: [CORE-BOUND-001, EVIDENCE-TRUST-001, TOP-P0-001, SEL-PROV-001, MCP-COMPAT-001], status: todo, depends_on: [P0-T11], tests: [MCP initialization consumer identity claim source-evidence structured-output compatible-text and cancellation tests]}
      - {id: P0-T8, title: Record VER-TXN-001 ADR and implement atomic prepare before-Observation RevisionContext barrier fixed target scope and bounded in-memory journal, contracts: [OBS-FRESH-001, VER-TXN-001], status: todo, depends_on: [P0-T12], tests: [ADR lint prepare atomicity target-scope journal-cursor expiry claim and stale-project tests]}
      - {id: P0-T13, title: Implement coordinator-observed relevant update matching bounded batch assembly and early-HMR journal replay, contracts: [VER-TXN-001], status: todo, depends_on: [P0-T8], tests: [early replay irrelevant-only timeout relevant-unrelated interleave multi-save JS-CSS batch module-graph ambiguity and journal-bound tests]}
      - {id: P0-T14, title: Implement prepared verification complete OBS-FRESH-001 direct before-after observation minimum DOM settle reattachment text assertions and honest terminal states, contracts: [OBS-FRESH-001, VER-TXN-001], status: todo, depends_on: [P0-T13], tests: [fresh-observation context browser receipt two-frame mutation-quiet assertion-poll text failed ambiguous timeout cancel and stale-document tests]}
      - {id: P0-T9, title: Add real-process Edge Stable select confirm prepare edit relevant-HMR complete walking-skeleton E2E and preregistered 10-to-20-task golden evidence, contracts: [UX-GATE-001, EDGE-PREFLIGHT-001, TOP-P0-001, VER-TXN-001], status: todo, depends_on: [P0-T14], tests: [Edge Stable two-OS-process vertical E2E, project-instance restart source top-k and zero-false-positive-passed golden baseline]}
      - {id: P0-T10, title: Add CI baseline roadmap validation and production leakage gate, contracts: [REQ-TRACE-001, PROD-LEAK-001, TEST-GATE-001], status: todo, depends_on: [P0-T2, P0-T9], tests: [local CI command production leakage and user-attribute preservation tests]}

  - id: P1
    title: Harden the Edge Vite-injected MVP
    status: todo
    depends_on: [P0]
    gate:
      commands: ["pnpm roadmap:validate", "pnpm build", "pnpm typecheck", "pnpm test", "pnpm test:edge:injected", "pnpm evidence:verify --phase P1"]
      done_when:
        - The minimum selector overlay and text-verification path from P0 is hardened for interaction accessibility and recovery.
        - Bounded context and the existing minimum EvidenceGraph are hardened without changing conflict-first semantics.
        - Anchor reconciliation remains honest across source revisions.
        - Multiple MCP consumers use server-derived identities and expiring selection claims without following mutable active-selection state.
        - MCP resource error cancellation and recovery behavior pass contract tests.
        - HMR transactions distinguish CSS update full reload compile error and stale document.
        - The walking-skeleton E2E remains green under nested and malicious fixtures.
        - A new project can install configure run and cleanly uninstall the injected preview without relying on P7 packaging.
        - UX-GATE-001 preregistered thresholds pass on at least three held-out React Vite projects for install-to-first-selection source confirmation first-edit keep-or-revert and uninstall evidence against a comparable no-VEM baseline before the project proceeds to P2.
    tasks:
      - {id: P1-T1, title: Harden the minimum selector mode state machine and local hover coalescing, contracts: [TEST-GATE-001], status: todo, depends_on: [P0-T9], tests: [state machine tests, hover coalescing tests]}
      - {id: P1-T2, title: Harden hover target filtering and bounding-box observation across DOM fixtures, contracts: [TEST-GATE-001], status: todo, depends_on: [P1-T1], tests: [DOM target fixtures]}
      - {id: P1-T3, title: Harden the isolated non-blocking overlay and click confirmation behavior, contracts: [TEST-GATE-001], status: todo, depends_on: [P1-T2], tests: [overlay integration tests]}
      - {id: P1-T4, title: Extend selection with ancestor switching page-root protection and keyboard cleanup, contracts: [TEST-GATE-001], status: todo, depends_on: [P1-T3], tests: [nested selection tests, accessibility checks]}
      - {id: P1-T5, title: Implement cross-revision anchor signatures migration candidates and ambiguity, contracts: [REV-ID-001], status: todo, depends_on: [P0-T16], tests: [anchor edit move collision and ambiguity tests]}
      - {id: P1-T6, title: Harden revision-scoped source registry with relative locations and compatibility namespace, contracts: [TEST-GATE-001], status: todo, depends_on: [P1-T5], tests: [mapping metadata revision and transform-compatibility tests]}
      - {id: P1-T7, title: Inject Vite page client with explicit-import fallback and capability probe, contracts: [TEST-GATE-001], status: todo, depends_on: [P1-T3, P1-T6], tests: [Vite injection integration tests]}
