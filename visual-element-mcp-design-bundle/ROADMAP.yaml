  - id: P1
    title: Harden the Edge Vite-injected MVP
    status: todo
    depends_on: [P0]
    gate:
      commands: ["pnpm roadmap:validate", "pnpm build", "pnpm typecheck", "pnpm test", "pnpm test:edge:injected", "pnpm evidence:verify --phase P1"]
      requires_decisions: {P1-INJECTED: continue}
      done_when:
        - The minimum selector overlay and text-verification path from P0 is hardened for interaction accessibility and recovery.
        - Bounded context and the existing minimum EvidenceGraph are hardened without changing conflict-first semantics.
        - Anchor reconciliation remains honest across source revisions.
        - Multiple MCP consumers use server-derived identities and expiring selection claims without following mutable active-selection state.
        - MCP resource error cancellation and recovery behavior pass contract tests.
        - HMR transactions distinguish CSS update full reload compile error and stale document.
        - The walking-skeleton E2E remains green under nested and malicious fixtures.
        - A new project can install configure run and cleanly uninstall the injected preview without relying on P7 packaging.
        - UX-GATE-001 preregistered thresholds pass on at least three held-out React Vite projects for install-to-first-selection source confirmation first-edit keep-or-revert and uninstall evidence against a comparable no-VEM baseline before the project proceeds to P2.
