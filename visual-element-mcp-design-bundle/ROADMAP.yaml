  - id: P4
    title: Edge advanced visual evidence stabilization and Visual V1 gate
    status: todo
    depends_on: [P3]
    gate:
      commands: ["pnpm roadmap:validate", "pnpm build", "pnpm typecheck", "pnpm test", "pnpm test:edge:visual-v1", "pnpm evidence:verify --phase P4"]
      done_when:
        - Edge extension preserves the P3 capture and geometry proof while adding advanced style evidence and visual stabilization.
        - Zoom DPR scroll and viewport metadata produce correct crops.
        - Style and layout requests collect bounded evidence only.
        - Objective geometry style and overflow checks are distinct from subjective review.
