schema_version: 3
project: visual-element-mcp
design_source: docs/DESIGN.md
requirements_source: docs/requirements.yaml
status_values:
  task: [todo, in_progress, blocked, done]
  phase: [todo, in_progress, blocked, passed, failed]
  decision: [pending, continue, adjust, stop]
execution_policy:
  atomic_task_only: true
  require_task_dependencies: true
  require_phase_dependencies: true
  test_after_each_task: true
  continue_on_failure: false
  require_progress_update: true
  require_phase_gate: true
  require_decision_dependencies: true
  decision_task_pending_until_done: true
  decision_task_done_requires_non_pending: true
  decision_verdict_does_not_replace_task_status: true
  decision_verdict_is_immutable: true
  decision_retry_requires_new_attempt_task: true
  adjust_requires_remediation_and_new_attempt: true
  stop_fails_owning_phase: true
  edge_first: true
  security_floor_must_not_fallback: true
  require_direct_contract_bindings: true
  require_bidirectional_contract_mapping: true
  atomic_task_expected_workdays: [1, 3]
  migration_source_display_path: /mnt/d/vem
  owner_migration_target: /home/qwzx/src/VEM
  canonical_project_root_rule: git-top-level
  staging_identity_rule: git-top-level-plus-device-inode
  project_contents_at_git_root: true
  p0_scope_boundary: proof-of-value-first
  calendar_schedule_is_advisory: true
  task_prompt_source: docs/tasks/ATOMIC_TASK_PROMPTS.md

decisions:
  P0-VALUE: {phase: P0, current_attempt: P0-T17B}
  P0-GOLDEN: {phase: P0, current_attempt: P0-T9C}
  P1-INJECTED: {phase: P1, current_attempt: P1-T17}
  P2-TRUSTED: {phase: P2, current_attempt: P2-T13D}
  P3-VISUAL: {phase: P3, current_attempt: P3-T19}
  P4-V1: {phase: P4, current_attempt: P4-T6C}

phases:
  - id: P0
    title: Edge Vite-injected walking skeleton and minimum contracts
    status: todo
    depends_on: []
    gate:
      commands: ["pnpm edge:preflight:verify", "pnpm install --frozen-lockfile", "pnpm roadmap:validate", "pnpm build", "pnpm typecheck", "pnpm test"]
      requires_decisions: {P0-VALUE: continue, P0-GOLDEN: continue}
      done_when:
        - EDGE-PREFLIGHT-001 has reproducible staging-to-canonical ext4 Git-root parity fixed Node-pnpm-Playwright direct and channel Edge Stable Windows-WSL HTTP-WebSocket-HMR loopback private-runtime ACL and real-process evidence or the phase remains blocked.
        - The preregistered P0 value micro-pilot completes before topology and verification expansion with isolated contexts and records an explicit continue verdict without consuming later holdouts; done with adjust or stop does not authorize dependent tasks.
        - Workspace checks are reproducible.
        - Edge Stable can select one intrinsic JSX button and return a PRIV-MIN-001 bounded source resolution backed by the minimum EvidenceGraph through MCP.
        - Injected selection is reported as page-untrusted under SEL-PROV-001 and strict prepared work requires an external prompt or confirmation binding.
        - The real Vite and MCP OS processes close TOP-P0-001 through private runtime discovery the same-origin browser proxy and one authoritative project instance.
        - A fixture source edit is prepared before editing with a RevisionContext barrier then correlated through VER-TXN-001 module-intersection evidence and journal replay to the correct Edge update batch and passes text verification.
        - Verification before and after observations are collected fresh under OBS-FRESH-001 and no ordinary context cache can produce passed.
        - Protocol and roadmap schemas reject invalid states and oversized payloads.
        - The minimum protocol including MCP-COMPAT-001 task and no-task behavior injected-browser source-anchor and verification decisions are recorded as accepted ADRs.
        - Production output contains no generated VEM marker client endpoint or mapping.
