      - {id: P1-T13, title: Harden prepared VerificationRun text assertions barrier expiry and complete ObservationDiff results, contracts: [VER-TXN-001], status: todo, depends_on: [P1-T11, P1-T12], tests: [text verification early-replay ambiguous diff and stale-document tests]}
