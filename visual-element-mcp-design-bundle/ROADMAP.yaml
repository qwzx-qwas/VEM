  - id: P2
    title: Edge MV3 extension, layered trust, and transport adapters
    status: todo
    depends_on: [P1]
    gate:
      commands: ["pnpm roadmap:validate", "pnpm build", "pnpm typecheck", "pnpm test", "pnpm test:edge:extension", "pnpm test:security:extension", "pnpm evidence:verify --phase P2"]
      done_when:
        - Edge extension selects the same fixture through isolated content script.
        - Page runtime and content script can never read the pairing token or trusted-context project and origin metadata.
        - Pairing requires user confirmation atomic consumption of a terminal one-time bootstrap code and an honestly documented short-lived scoped bearer capability bound server-side to exact project origin coordinator instance connection epoch and capability scope.
        - Service worker derives sender identity and rejects forged replayed and oversized messages.
        - Tier-1 Windows and Windows-WSL Edge topologies pass; Linux local IPC has contract coverage while container SSH and remote gates remain in P7.
        - Fresh Edge profile pilot evidence records pairing success failure recovery revoke and uninstall outcomes before visual infrastructure expands.
