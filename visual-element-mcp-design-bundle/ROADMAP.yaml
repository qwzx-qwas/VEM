      - {id: P1-T11, title: Add minimum explicit ContextRequest support and Codex-local TaskIntent planning for the injected MVP, contracts: [TEST-GATE-001], status: todo, depends_on: [P1-T10], tests: [context projection budget and local-planning tests]}
