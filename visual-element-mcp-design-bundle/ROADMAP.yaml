  - id: P3
    title: First trusted visual slice then bounded pipeline and lifecycle hardening
    status: todo
    depends_on: [P2]
    gate:
      commands: ["pnpm roadmap:validate", "pnpm build", "pnpm typecheck", "pnpm test", "pnpm test:edge:visual", "pnpm test:pipeline", "pnpm evidence:verify --phase P3"]
      done_when:
        - Selection sends a bounded summary and details are pulled by ContextRequest.
        - Edge captures the intended active tab and element with consent local masks pre/post tab-document checks and short-lived memory-first resources.
        - Bounded computed styles geometry assertions and a real-pixel Edge visual proof pass while durable artifact capabilities remain explicitly unavailable until P6.
        - Control traffic remains responsive under diagnostics and binary artifact load and cache invalidates on RevisionContext request shape and OBS-FRESH-001 runtime target viewport epochs.
        - Memory-first resources enforce ownership hard TTL quota active lease manual clear and process-exit deletion; durable pinning and orphan cleanup remain unavailable until P6.
        - Fallback is visible and never crosses the security floor.
        - At least 50 categorized tasks plus a separate held-out project set record source top-k payload first-edit verification ambiguity correctness and zero false-positive passed results.
